<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>家計管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <main id="main-content">
      <section id="tab-bonus" class="tab-content active">
        <div id="bonus-content"></div>
      </section>
      <section id="tab-monthly" class="tab-content">
        <div id="monthly-content"></div>
      </section>
      <section id="tab-settings" class="tab-content">
        <div id="settings-content"></div>
      </section>
    </main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="bonus">
        <span class="nav-icon">💰</span>
        <span class="nav-label">ボーナス</span>
      </button>
      <button class="nav-btn" data-tab="monthly">
        <span class="nav-icon">📅</span>
        <span class="nav-label">月次</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">設定</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-container">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" aria-label="閉じる">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">データを読み込み中...</div>
  </div>

  <div id="login-overlay" class="hidden">
    <div id="login-box">
      <div class="login-logo">💰</div>
      <h1 class="login-title">家計管理</h1>
      <div class="form-group">
        <label class="form-label">ID</label>
        <input class="form-input" id="login-id" type="text" autocomplete="username" placeholder="ID を入力">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input class="form-input" id="login-pw" type="password" autocomplete="current-password" placeholder="パスワードを入力">
      </div>
      <div id="login-error" class="login-error hidden"></div>
      <button class="btn btn-primary btn-block" id="login-btn" onclick="attemptLogin()">ログイン</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
